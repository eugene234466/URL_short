services:
  # Web Service
  - type: web
    name: url-shortener
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: url-shortener-db
          property: connectionString
    
  # MySQL Database
  - type: pserv
    name: url-shortener-db
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile.mysql
